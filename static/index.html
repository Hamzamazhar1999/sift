<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<title>sift</title>
<link rel="icon" type="image/png" href="/static/icon.png">
<script>
  // Apply the theme before first paint to avoid a light-mode flash.
  (function () {
    var t = localStorage.getItem('sift.theme');
    if (!t) t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    document.documentElement.dataset.theme = t;
  })();
</script>
<style>
  :root {
    --accent: #d97757;
    --bg: #fafafa;
    --pane-bg: #ffffff;
    --border: #e5e5e5;
    --border-soft: #ececec;
    --text: #1a1a1c;
    --text-soft: #4a4a4d;
    --muted: #888;
    --code-bg: #f0eeea;
    --pageref-bg: #f0e9d3;
    --cite-bg: #fff7d6;
    --cite-bg-hover: #fff0a8;
    --cite-missing-bg: #f4f4f4;
    --cite-missing-border: #ddd;
    --thoughts-bg: #ffffff;
    --thoughts-hover: #f7f7f7;
    --thoughts-text: #555;
    --pdf-frame-bg: #4a4a4a;
    --pdf-bar-bg: #fafafa;
    --shadow: 0 1px 2px rgba(0,0,0,0.04);
  }
  [data-theme="dark"] {
    --accent: #e8895d;
    --bg: #18181a;
    --pane-bg: #1f1f22;
    --border: #38383d;
    --border-soft: #2c2c30;
    --text: #e8e8e9;
    --text-soft: #c0c0c3;
    --muted: #8c8c90;
    --code-bg: #2a2826;
    --pageref-bg: #3a342c;
    --cite-bg: #2a2620;
    --cite-bg-hover: #34302a;
    --cite-missing-bg: #232326;
    --cite-missing-border: #3a3a3e;
    --thoughts-bg: #1f1f22;
    --thoughts-hover: #2a2a2e;
    --thoughts-text: #b8b8bb;
    --pdf-frame-bg: #1a1a1c;
    --pdf-bar-bg: #1f1f22;
    --shadow: 0 1px 2px rgba(0,0,0,0.3);
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0; height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    color: var(--text);
    background: var(--bg);
  }
  body { display: flex; transition: background 0.15s, color 0.15s; }

  /* Left pane (PDF) */
  #left { flex: 1; min-width: 0; border-right: 1px solid var(--border); display: flex; flex-direction: column; background: var(--pane-bg); }
  #left-bar { padding: 8px 12px; border-bottom: 1px solid var(--border); display: flex; gap: 10px; align-items: center; font-size: 13px; background: var(--pdf-bar-bg); color: var(--text-soft); }
  #left-bar select { flex: 1; padding: 5px 6px; background: var(--pane-bg); color: var(--text); border: 1px solid var(--border); border-radius: 4px; font: inherit; }
  #left-bar label { display: flex; gap: 5px; align-items: center; color: var(--muted); }
  /* Tell the PDF iframe to render in a light color scheme regardless of
     the surrounding theme — Chromium otherwise inverts PDFs in dark mode
     and that wrecks the yellow/pastel highlight colors we authored. */
  #pdf-frame { flex: 1; border: 0; width: 100%; background: var(--pdf-frame-bg); color-scheme: light; }
  .placeholder { padding: 40px; color: var(--muted); text-align: center; font-size: 13px; }

  /* Right pane (chat) */
  #right { width: 470px; display: flex; flex-direction: column; padding: 14px; gap: 10px; background: var(--pane-bg); }

  /* Brand header */
  #brand { display: flex; align-items: center; gap: 10px; padding-bottom: 4px; border-bottom: 1px solid var(--border-soft); margin-bottom: 2px; }
  #brand img { width: 32px; height: 32px; object-fit: contain; }
  #brand h1 { font-size: 18px; margin: 0; flex: 1; letter-spacing: -0.01em; font-weight: 600; }
  #theme-toggle { background: transparent; border: 1px solid var(--border); border-radius: 6px; padding: 4px 8px; cursor: pointer; font-size: 13px; color: var(--text-soft); transition: background 0.1s; }
  #theme-toggle:hover { background: var(--bg); }

  /* Upload row */
  #upload-row { display: flex; gap: 8px; align-items: center; font-size: 13px; }
  #upload-row input[type="file"] { flex: 1; min-width: 0; color: var(--text-soft); font: inherit; font-size: 12.5px; }
  #upload-row input[type="file"]::file-selector-button { background: var(--pane-bg); color: var(--text); border: 1px solid var(--border); padding: 5px 10px; border-radius: 4px; font: inherit; font-size: 12.5px; cursor: pointer; margin-right: 8px; }
  #upload-row input[type="file"]::file-selector-button:hover { background: var(--bg); }
  #upload-row #clear { font-size: 12px; padding: 5px 10px; border: 1px solid var(--border); background: var(--pane-bg); border-radius: 4px; cursor: pointer; color: var(--text-soft); }
  #upload-row #clear:hover:not(:disabled) { background: var(--cite-bg); color: var(--accent); border-color: var(--accent); }
  #upload-row #clear:disabled { opacity: 0.35; cursor: default; }

  /* Log */
  #log { flex: 1; overflow-y: auto; background: var(--bg); padding: 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 13.5px; line-height: 1.5; color: var(--text); }
  #log .turn { margin-bottom: 16px; padding-bottom: 14px; border-bottom: 1px dashed var(--border); }
  #log .turn:last-child { border-bottom: 0; }
  #log .q { font-weight: 600; margin-bottom: 6px; color: var(--text); }
  #log .answer { line-height: 1.55; color: var(--text); }
  #log .answer p { margin: 0 0 8px; }
  #log .answer p:last-child { margin-bottom: 0; }
  #log .answer ul, #log .answer ol { margin: 4px 0 8px; padding-left: 22px; }
  #log .answer li { margin: 2px 0; }
  #log .answer h1, #log .answer h2, #log .answer h3 { margin: 10px 0 4px; font-size: 14px; color: var(--text); }
  #log .answer code { background: var(--code-bg); padding: 1px 5px; border-radius: 3px; font-size: 12.5px; font-family: ui-monospace, Menlo, monospace; }
  #log .answer table { border-collapse: collapse; margin: 8px 0; font-size: 12.5px; display: block; max-width: 100%; overflow-x: auto; }
  #log .answer th, #log .answer td { border: 1px solid var(--border); padding: 6px 9px; text-align: left; vertical-align: top; }
  #log .answer th { background: var(--code-bg); font-weight: 600; }
  #log .answer tbody tr:nth-child(even) td { background: var(--pane-bg); }
  #log .answer strong { font-weight: 600; }
  #log .answer a { color: var(--accent); }

  /* Inline page-ref pill */
  #log .pageref { color: #1a1a1c; cursor: pointer; font-weight: 500; padding: 1px 6px; border-radius: 4px; background: var(--pageref-bg); transition: filter 0.1s; }
  #log .pageref:hover { filter: brightness(0.92); text-decoration: underline; }
  #log .pageref.unmatched { color: var(--accent); background: transparent; padding: 0 1px; }

  /* Thinking indicator */
  #log .thinking { color: var(--muted); font-size: 13px; font-style: italic; display: flex; align-items: baseline; gap: 2px; }
  #log .thinking .word { transition: opacity 0.25s ease; }
  #log .thinking .dots::after { content: '…'; animation: dots 1.4s steps(4, end) infinite; display: inline-block; min-width: 1em; }
  @keyframes dots { 0%,24% { content: '.'; } 25%,49% { content: '..'; } 50%,100% { content: '…'; } }

  #log .meta { color: var(--muted); font-size: 11.5px; margin-top: 6px; }
  #log .stats { color: var(--muted); font-size: 11.5px; margin-bottom: 4px; }

  /* Thoughts trail */
  #log .thoughts { font-size: 12px; color: var(--muted); margin: 4px 0 8px; border: 1px solid var(--border); border-radius: 5px; background: var(--thoughts-bg); }
  #log .thoughts summary { cursor: pointer; user-select: none; padding: 6px 10px; list-style: none; display: flex; gap: 6px; align-items: center; }
  #log .thoughts summary::-webkit-details-marker { display: none; }
  #log .thoughts summary::before { content: '▸'; transition: transform 0.15s ease; display: inline-block; }
  #log .thoughts[open] summary::before { transform: rotate(90deg); }
  #log .thoughts summary:hover { color: var(--text); background: var(--thoughts-hover); }
  #log .thoughts .body { padding: 0 10px 6px 22px; border-top: 1px solid var(--border-soft); }
  #log .thoughts .entry { padding: 5px 0; white-space: pre-wrap; line-height: 1.4; }
  #log .thoughts .entry + .entry { border-top: 1px dashed var(--border-soft); }
  #log .thoughts .entry.tool { font-family: ui-monospace, Menlo, monospace; font-size: 11px; color: var(--muted); }
  #log .thoughts .entry.text { color: var(--thoughts-text); }

  /* Citations */
  #log .citations { margin-top: 10px; }
  #log .citations h4 { margin: 4px 0; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.6px; font-weight: 600; }
  .citation { display: block; background: var(--cite-bg); border: 1px solid var(--border); border-left: 4px solid var(--accent); padding: 7px 10px; margin: 5px 0; border-radius: 4px; cursor: pointer; font-size: 12.5px; line-height: 1.4; color: var(--text); transition: background 0.1s; box-shadow: var(--shadow); }
  .citation:hover { background: var(--cite-bg-hover); }
  .citation .pg { font-weight: 600; color: var(--accent); margin-right: 6px; }
  .citation.missing { background: var(--cite-missing-bg); border-color: var(--cite-missing-border); border-left-color: var(--muted); color: var(--muted); cursor: default; box-shadow: none; }

  /* Composer */
  #q { width: 100%; padding: 10px; resize: vertical; min-height: 72px; font: inherit; border: 1px solid var(--border); border-radius: 6px; background: var(--pane-bg); color: var(--text); }
  #q:focus { outline: 2px solid var(--accent); outline-offset: -1px; border-color: transparent; }
  #ask-row { display: flex; gap: 10px; align-items: center; }
  #ask-row label { display: flex; gap: 5px; align-items: center; color: var(--muted); font-size: 12px; }
  #ask-row select { font-size: 12px; padding: 4px 6px; background: var(--pane-bg); color: var(--text); border: 1px solid var(--border); border-radius: 4px; font-family: inherit; }
  #send { flex: 1; padding: 10px; background: var(--accent); color: white; border: 0; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 14px; transition: filter 0.1s; }
  #send:hover:not(:disabled) { filter: brightness(1.05); }
  #send:disabled { opacity: 0.45; cursor: default; }

  /* Scrollbars (subtle) */
  #log::-webkit-scrollbar { width: 8px; }
  #log::-webkit-scrollbar-track { background: transparent; }
  #log::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  #log::-webkit-scrollbar-thumb:hover { background: var(--muted); }
</style>
</head>
<body>
<div id="left">
  <div id="left-bar">
    <select id="pdf-select"><option value="">(no PDF loaded)</option></select>
    <label style="font-size:12px;color:var(--muted)"><input type="checkbox" id="show-highlighted"> highlighted</label>
  </div>
  <iframe id="pdf-frame" src="about:blank"></iframe>
</div>

<div id="right">
  <header id="brand">
    <img src="/static/icon.png" alt="">
    <h1>sift</h1>
    <button id="theme-toggle" title="Toggle theme" aria-label="Toggle theme">☾</button>
  </header>
  <div id="upload-row">
    <input type="file" id="upload" accept="application/pdf">
    <button id="clear" title="Clear chat history for this PDF" disabled>↩ clear</button>
  </div>
  <div id="log"><div class="placeholder">Upload or pick a PDF, then ask a question.</div></div>
  <textarea id="q" placeholder="Ask a question about the PDF… (Enter to send, Shift+Enter for newline)"></textarea>
  <div id="ask-row">
    <label style="font-size:12px;color:var(--muted)">model
      <select id="model"></select>
    </label>
    <label style="font-size:12px;color:var(--muted)">mode
      <select id="mode"></select>
    </label>
    <button id="send" disabled>Ask</button>
  </div>
</div>

<script>
const upload = document.getElementById('upload');
const select = document.getElementById('pdf-select');
const showHighlighted = document.getElementById('show-highlighted');
const pdfFrame = document.getElementById('pdf-frame');
const send = document.getElementById('send');
const q = document.getElementById('q');
const log = document.getElementById('log');
const modelSelect = document.getElementById('model');
const modeSelect = document.getElementById('mode');
const clearBtn = document.getElementById('clear');
const themeToggle = document.getElementById('theme-toggle');

// --- theme handling ---
function applyTheme(t) {
  document.documentElement.dataset.theme = t;
  // Show the icon of the theme you'd switch TO (sun in dark, moon in light)
  themeToggle.textContent = t === 'dark' ? '☀' : '☾';
}
applyTheme(localStorage.getItem('sift.theme') ||
  (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'));
themeToggle.addEventListener('click', () => {
  const next = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
  applyTheme(next);
  localStorage.setItem('sift.theme', next);
});

function populate(sel, cfg, storageKey) {
  sel.innerHTML = '';
  for (const c of cfg.choices) {
    const o = document.createElement('option');
    o.value = c; o.textContent = c;
    if (c === cfg.default) o.selected = true;
    sel.appendChild(o);
  }
  const saved = localStorage.getItem(storageKey);
  if (saved && cfg.choices.includes(saved)) sel.value = saved;
  sel.addEventListener('change', () => localStorage.setItem(storageKey, sel.value));
}

(async () => {
  const fallback = {
    models: { choices: ['haiku', 'sonnet', 'opus', 'inherit'], default: 'haiku' },
    modes:  { choices: ['strict', 'brainstorm'],               default: 'strict' },
  };
  let j = fallback;
  try {
    const r = await fetch('/config');
    if (r.ok) {
      const data = await r.json();
      if (data && data.models && data.modes) j = data;
    }
  } catch (_) { /* fall through to defaults */ }
  populate(modelSelect, j.models, 'sift.model');
  populate(modeSelect, j.modes, 'sift.mode');
})();

// --- minimal markdown renderer (bold, italic, code, lists, headings, links) ---
function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function inlineMd(s) {
  s = escapeHtml(s);
  s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
  s = s.replace(/\*\*([^*\n]+)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/(^|[\s(])\*([^*\n]+)\*(?=[\s).,!?;:]|$)/g, '$1<em>$2</em>');
  s = s.replace(/\[([^\]]+)\]\((https?:[^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
  return s;
}
// Walk text nodes under `root` and turn "(p. N)" / "(pp. N, M)" into clickable
// .pageref spans. dataset.pages is a JSON array of page numbers.
function linkifyPageRefs(root) {
  const re = /\((pp?\.?)\s*([\d][\d,\s–—\-]*)\)/g;
  const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, null);
  const nodes = [];
  for (let n; (n = walker.nextNode()); ) {
    if (n.parentNode && n.parentNode.classList && n.parentNode.classList.contains('pageref')) continue;
    if (re.test(n.nodeValue)) { re.lastIndex = 0; nodes.push(n); }
  }
  for (const node of nodes) {
    const s = node.nodeValue;
    const frag = document.createDocumentFragment();
    let last = 0; let m;
    while ((m = re.exec(s))) {
      if (m.index > last) frag.appendChild(document.createTextNode(s.slice(last, m.index)));
      const span = document.createElement('span');
      span.className = 'pageref';
      span.textContent = m[0];
      const pages = m[2].split(/[,\s–—\-]+/).filter(Boolean).map(p => parseInt(p, 10)).filter(Number.isFinite);
      span.dataset.pages = JSON.stringify(pages);
      frag.appendChild(span);
      last = m.index + m[0].length;
    }
    if (last < s.length) frag.appendChild(document.createTextNode(s.slice(last)));
    node.parentNode.replaceChild(frag, node);
  }
}

// Color each .pageref span under `root` with its matching citation's color.
// Mapping: walk pagerefs in document order, build a per-page queue of
// citations, and pop the next citation off the queue whose page matches the
// pageref's first page. Pagerefs that don't find a match get marked
// .unmatched (rendered in the plain accent style).
function colorPageRefs(root, citations) {
  const queues = {};
  (citations || []).forEach(c => {
    if (c.found === false || !c.color) return;
    (queues[c.page] = queues[c.page] || []).push(c);
  });
  const refs = root.querySelectorAll('.pageref');
  for (const ref of refs) {
    const pages = JSON.parse(ref.dataset.pages || '[]');
    const p = pages[0];
    const queue = queues[p];
    if (queue && queue.length) {
      const c = queue.shift();
      ref.style.backgroundColor = c.color;
      ref.classList.remove('unmatched');
    } else {
      ref.classList.add('unmatched');
      ref.style.backgroundColor = '';
    }
  }
}

// Pipe-table helpers (GFM-style):
//   | h1 | h2 |
//   |----|---:|
//   | a  | b  |
function isTableSeparator(line) {
  if (!line) return false;
  const t = line.trim();
  if (!t.includes('|')) return false;
  const inner = t.replace(/^\||\|$/g, '');
  const cells = inner.split('|').map(c => c.trim());
  return cells.length > 0 && cells.every(c => /^:?-{2,}:?$/.test(c));
}
function parseTableRow(line) {
  const t = line.trim().replace(/^\||\|$/g, '');
  return t.split('|').map(c => c.trim());
}
function alignFromSep(cell) {
  const t = cell.trim();
  const left = t.startsWith(':');
  const right = t.endsWith(':');
  if (left && right) return 'center';
  if (right) return 'right';
  if (left) return 'left';
  return '';
}
function renderTable(headers, sepCells, rows) {
  const aligns = sepCells.map(alignFromSep);
  const styleFor = i => aligns[i] ? ` style="text-align:${aligns[i]}"` : '';
  const head = '<thead><tr>' +
    headers.map((h, k) => `<th${styleFor(k)}>${inlineMd(h)}</th>`).join('') +
    '</tr></thead>';
  const body = '<tbody>' +
    rows.map(r =>
      '<tr>' + r.map((c, k) => `<td${styleFor(k)}>${inlineMd(c)}</td>`).join('') + '</tr>'
    ).join('') + '</tbody>';
  return `<table>${head}${body}</table>`;
}

function renderMarkdown(text) {
  const lines = text.split('\n');
  const out = [];
  let i = 0;
  while (i < lines.length) {
    const line = lines[i];
    let m;
    if ((m = line.match(/^(#{1,6})\s+(.+)$/))) {
      const h = Math.min(6, m[1].length + 1);
      out.push(`<h${h}>${inlineMd(m[2])}</h${h}>`);
      i++;
    } else if (
      line.trim().includes('|') &&
      i + 1 < lines.length &&
      isTableSeparator(lines[i + 1])
    ) {
      const headers = parseTableRow(line);
      const sepCells = parseTableRow(lines[i + 1]);
      i += 2;
      const rows = [];
      while (i < lines.length && lines[i].trim().includes('|') && lines[i].trim() !== '') {
        rows.push(parseTableRow(lines[i]));
        i++;
      }
      out.push(renderTable(headers, sepCells, rows));
    } else if (line.match(/^\s*[-*]\s+/)) {
      const items = [];
      while (i < lines.length && lines[i].match(/^\s*[-*]\s+/)) {
        items.push(`<li>${inlineMd(lines[i].replace(/^\s*[-*]\s+/, ''))}</li>`);
        i++;
      }
      out.push(`<ul>${items.join('')}</ul>`);
    } else if (line.match(/^\s*\d+\.\s+/)) {
      const items = [];
      while (i < lines.length && lines[i].match(/^\s*\d+\.\s+/)) {
        items.push(`<li>${inlineMd(lines[i].replace(/^\s*\d+\.\s+/, ''))}</li>`);
        i++;
      }
      out.push(`<ol>${items.join('')}</ol>`);
    } else if (line.trim() === '') {
      i++;
    } else {
      const para = [];
      while (
        i < lines.length &&
        lines[i].trim() !== '' &&
        !lines[i].match(/^\s*([-*]|\d+\.)\s+|^#{1,6}\s+/) &&
        !(lines[i].trim().includes('|') && i + 1 < lines.length && isTableSeparator(lines[i + 1]))
      ) {
        para.push(lines[i]);
        i++;
      }
      out.push(`<p>${inlineMd(para.join(' '))}</p>`);
    }
  }
  return out.join('');
}

let fileId = null;
let hasHighlighted = false;

function pdfUrl(page) {
  if (!fileId) return 'about:blank';
  const params = new URLSearchParams();
  if (showHighlighted.checked && hasHighlighted) params.set('highlighted', 'true');
  // bust iframe cache so re-running re-renders the new highlighted file
  params.set('t', Date.now());
  let u = '/pdf/' + encodeURIComponent(fileId) + '?' + params.toString();
  if (page) u += '#page=' + page;
  return u;
}

function reloadFrame(page) {
  pdfFrame.src = pdfUrl(page);
}

async function refreshList(selected) {
  const r = await fetch('/pdfs');
  const j = await r.json();
  select.innerHTML = '<option value="">(pick a PDF)</option>';
  for (const f of j.files) {
    const o = document.createElement('option');
    o.value = f; o.textContent = f;
    if (f === selected) o.selected = true;
    select.appendChild(o);
  }
}

function loadFile(name) {
  fileId = name;
  hasHighlighted = false;
  showHighlighted.checked = false;
  reloadFrame();
  send.disabled = !fileId;
  // Reset chat panel and rehydrate history for this PDF
  log.innerHTML = '<div class="placeholder">Loading…</div>';
  loadHistory();
}

function renderPastTurn(t) {
  const turn = turnEl();
  turn.appendChild(el('div', 'q', 'Q: ' + t.question));
  const answer = el('div', 'answer');
  answer.innerHTML = renderMarkdown(t.answer || '');
  linkifyPageRefs(answer);
  turn.appendChild(answer);
  const cites = t.citations || [];
  if (cites.length) {
    const box = el('div', 'citations');
    box.appendChild(el('h4', null, 'Citations'));
    cites.forEach(c => buildCitationChip(c, box));
    turn.appendChild(box);
  }
  colorPageRefs(answer, cites);
  log.appendChild(turn);
}

function buildCitationChip(c, box) {
  const cite = el('div', 'citation' + (c.found === false ? ' missing' : ''));
  if (c.color) cite.style.borderLeftColor = c.color;
  cite.appendChild(el('span', 'pg', 'p.' + c.page));
  cite.appendChild(document.createTextNode(c.quote));
  if (c.found !== false) {
    cite.addEventListener('click', () => {
      showHighlighted.checked = true;
      reloadFrame(c.page);
    });
  }
  box.appendChild(cite);
}

async function loadHistory() {
  if (!fileId) { clearBtn.disabled = true; return; }
  let turns = [];
  try {
    const r = await fetch('/history/' + encodeURIComponent(fileId));
    if (r.ok) turns = (await r.json()).turns || [];
  } catch {}
  if (!turns.length) {
    log.innerHTML = '<div class="placeholder">Ask a question about this PDF.</div>';
    clearBtn.disabled = true;
    return;
  }
  log.innerHTML = '';
  turns.forEach(renderPastTurn);
  clearBtn.disabled = false;
  // Past turns may have generated a highlighted PDF; check if it exists.
  fetch('/pdf/' + encodeURIComponent(fileId) + '?highlighted=true', { method: 'HEAD' })
    .then(r => { if (r.ok) hasHighlighted = true; })
    .catch(() => {});
}

clearBtn.addEventListener('click', async () => {
  if (!fileId) return;
  if (!confirm('Clear chat history for this PDF?')) return;
  await fetch('/clear/' + encodeURIComponent(fileId), { method: 'POST' });
  log.innerHTML = '<div class="placeholder">Cleared. Ask a new question.</div>';
  clearBtn.disabled = true;
});

upload.addEventListener('change', async () => {
  const f = upload.files[0];
  if (!f) return;
  const fd = new FormData();
  fd.append('file', f);
  const r = await fetch('/upload', { method: 'POST', body: fd });
  const j = await r.json();
  await refreshList(j.file_id);
  loadFile(j.file_id);
});

select.addEventListener('change', () => {
  if (select.value) loadFile(select.value);
});

showHighlighted.addEventListener('change', () => reloadFrame());

log.addEventListener('click', e => {
  const ref = e.target.closest('.pageref');
  if (!ref || !fileId) return;
  const pages = JSON.parse(ref.dataset.pages || '[]');
  if (!pages.length) return;
  showHighlighted.checked = true;
  reloadFrame(pages[0]);
});

// Generic Claude-style activity verbs. Never task-specific — we don't expose
// what the agent is actually doing.
const THINKING_WORDS = [
  'Pondering', 'Brewing', 'Cooking', 'Noodling', 'Hatching', 'Marinating',
  'Spelunking', 'Mulling', 'Whisking', 'Sleuthing', 'Combing', 'Reasoning',
  'Untangling', 'Distilling', 'Synthesizing', 'Excavating', 'Unraveling',
  'Considering', 'Crunching', 'Percolating', 'Ruminating', 'Cogitating',
  'Deliberating', 'Scheming', 'Puzzling', 'Tinkering', 'Foraging', 'Divining',
];

function pickThinkingWord(prev) {
  let w;
  do { w = THINKING_WORDS[Math.floor(Math.random() * THINKING_WORDS.length)]; }
  while (w === prev);
  return w;
}

function makeThinking() {
  const div = el('div', 'thinking');
  const word = el('span', 'word', pickThinkingWord());
  const dots = el('span', 'dots');
  div.appendChild(word);
  div.appendChild(dots);
  div._tick = setInterval(() => {
    word.style.opacity = '0';
    setTimeout(() => {
      word.textContent = pickThinkingWord(word.textContent);
      word.style.opacity = '1';
    }, 250);
  }, 2200);
  div._stop = () => clearInterval(div._tick);
  return div;
}

function turnEl() {
  const el = document.createElement('div');
  el.className = 'turn';
  return el;
}

function el(tag, cls, text) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (text != null) e.textContent = text;
  return e;
}

send.addEventListener('click', async () => {
  if (!fileId || !q.value.trim()) return;
  send.disabled = true;
  const question = q.value;
  q.value = '';

  // clear placeholder on first turn
  const placeholder = log.querySelector('.placeholder');
  if (placeholder) log.innerHTML = '';

  const turn = turnEl();
  turn.appendChild(el('div', 'q', 'Q: ' + question));
  const stats = el('div', 'stats', '');
  turn.appendChild(stats);
  const answer = el('div', 'answer', '');
  answer.style.display = 'none';
  turn.appendChild(answer);
  const meta = el('div', 'meta', '');
  turn.appendChild(meta);
  log.appendChild(turn);
  log.scrollTop = log.scrollHeight;

  const startMs = Date.now();
  const trail = [];  // [{kind: 'text'|'tool', content: string}]

  let answerRaw = '';
  let thinking = null;
  function showThinking() {
    if (thinking && thinking.isConnected) return;
    if (thinking && thinking._stop) thinking._stop();
    thinking = makeThinking();
    turn.insertBefore(thinking, answer);
    answer.style.display = 'none';
    answer.innerHTML = '';
    answerRaw = '';
  }
  function stopThinking() {
    if (thinking) {
      if (thinking._stop) thinking._stop();
      thinking.remove();
      thinking = null;
    }
  }
  showThinking();

  function needsSpace(prev, chunk) {
    if (!prev || !chunk) return false;
    const last = prev.slice(-1);
    const first = chunk[0];
    if (/\s/.test(last) || /\s/.test(first)) return false;
    if (/[.,;:!?)\]'"]/.test(first)) return false;
    return true;
  }

  let r;
  try {
    r = await fetch('/ask', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ file_id: fileId, question, model: modelSelect.value, mode: modeSelect.value }),
    });
  } catch (e) {
    stopThinking();
    meta.textContent = 'request failed: ' + e;
    send.disabled = false;
    return;
  }

  const reader = r.body.getReader();
  const dec = new TextDecoder();
  let buf = '';
  while (true) {
    const { value, done } = await reader.read();
    if (done) break;
    buf += dec.decode(value, { stream: true });
    const events = buf.split('\n\n');
    buf = events.pop();
    for (const evt of events) {
      const line = evt.replace(/^data: /, '').trim();
      if (!line) continue;
      let m;
      try { m = JSON.parse(line); } catch { continue; }
      if (m.type === 'text') {
        if (answer.style.display === 'none') {
          stopThinking();
          answer.style.display = '';
        }
        let chunk = m.data;
        if (needsSpace(answerRaw, chunk)) chunk = ' ' + chunk;
        answerRaw += chunk;
        answer.innerHTML = renderMarkdown(answerRaw);
        linkifyPageRefs(answer);
      } else if (m.type === 'stats') {
        const k = (m.data.char_count / 1000).toFixed(1);
        stats.textContent = `Loaded ${m.data.page_count} pages · ${k}k chars`;
      } else if (m.type === 'tool') {
        // The currently-visible text was thinking-out-loud — preserve it in
        // the trail, then reset the visible answer back to the indicator.
        // Only post-last-tool text sticks as the real answer.
        if (answerRaw.trim()) {
          trail.push({ kind: 'text', content: answerRaw.trim() });
        }
        trail.push({ kind: 'tool', content: m.data });
        showThinking();
      } else if (m.type === 'done') {
        stopThinking();
        clearBtn.disabled = false;
        if (trail.length) {
          const elapsed = ((Date.now() - startMs) / 1000).toFixed(1);
          const steps = trail.filter(e => e.kind === 'tool').length;
          const details = document.createElement('details');
          details.className = 'thoughts';
          const summary = document.createElement('summary');
          summary.textContent = `Thought for ${elapsed}s · ${steps} step${steps === 1 ? '' : 's'}`;
          details.appendChild(summary);
          const body = el('div', 'body');
          for (const e of trail) {
            const div = document.createElement('div');
            div.className = 'entry ' + e.kind;
            if (e.kind === 'text') {
              div.innerHTML = renderMarkdown(e.content);
              linkifyPageRefs(div);
            } else {
              div.textContent = e.content;
            }
            body.appendChild(div);
          }
          details.appendChild(body);
          turn.insertBefore(details, answer);
        }
        if (m.data.highlighted_pdf) {
          hasHighlighted = true;
          showHighlighted.checked = true;
          reloadFrame();
        }
        const cites = m.data.citations || [];
        if (cites.length) {
          const box = el('div', 'citations');
          box.appendChild(el('h4', null, 'Citations'));
          cites.forEach(c => buildCitationChip(c, box));
          turn.appendChild(box);
          colorPageRefs(answer, cites);
        }
        if (m.data.cost_usd) {
          meta.textContent = `$${m.data.cost_usd.toFixed(4)}`;
        }
      } else if (m.type === 'error') {
        stopThinking();
        meta.textContent = 'ERROR: ' + m.data;
      }
      log.scrollTop = log.scrollHeight;
    }
  }
  send.disabled = false;
});

q.addEventListener('keydown', e => {
  // Enter sends, Shift+Enter inserts a newline.
  if (e.key === 'Enter' && !e.shiftKey && !e.isComposing) {
    e.preventDefault();
    if (!send.disabled) send.click();
  }
});

refreshList();
</script>
</body>
